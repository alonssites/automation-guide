<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>מדריך שדרוג אוטומציית Make.com</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #ffffff; --bg2: #f5f5f3; --bg-info: #e6f1fb; --bg-warn: #faeeda;
    --bg-ok: #eaf3de; --bg-err: #fcebeb;
    --tx: #1a1a18; --tx2: #5f5e5a; --tx3: #888780;
    --tx-info: #185fa5; --tx-warn: #854f0b; --tx-ok: #3b6d11; --tx-err: #a32d2d;
    --br: rgba(0,0,0,0.12); --br2: rgba(0,0,0,0.22);
    --r: 8px; --rl: 12px;
    --sans: system-ui,-apple-system,sans-serif; --mono: Menlo,Consolas,monospace;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1c1c1a; --bg2: #252523; --bg-info: #0c2e52; --bg-warn: #3d2404;
      --bg-ok: #1a3308; --bg-err: #3d1010;
      --tx: #e8e6de; --tx2: #b4b2a9; --tx3: #888780;
      --tx-info: #85b7eb; --tx-warn: #fac775; --tx-ok: #c0dd97; --tx-err: #f09595;
      --br: rgba(255,255,255,0.1); --br2: rgba(255,255,255,0.2);
    }
  }
  body { font-family: var(--sans); background: var(--bg); color: var(--tx); direction: rtl; min-height: 100vh; padding: 1.5rem; }
  .app { max-width: 760px; margin: 0 auto; border: 0.5px solid var(--br); border-radius: var(--rl); overflow: hidden; background: var(--bg); }
  .hdr { padding: 1.5rem 1.5rem 1rem; border-bottom: 0.5px solid var(--br); }
  .hdr h1 { font-size: 18px; font-weight: 500; margin: 0 0 4px; }
  .hdr p { font-size: 13px; color: var(--tx2); margin: 0; }
  .prog { display: flex; gap: 6px; padding: 1rem 1.5rem; border-bottom: 0.5px solid var(--br); flex-wrap: wrap; }
  .dot { width: 10px; height: 10px; border-radius: 50%; background: var(--br); cursor: pointer; transition: background .2s, transform .2s; flex-shrink: 0; }
  .dot.done { background: var(--tx-ok); }
  .dot.active { background: var(--tx-info); transform: scale(1.3); }
  .body { padding: 1.5rem; }
  .badge { display: inline-block; font-size: 11px; font-weight: 500; padding: 3px 10px; border-radius: 20px; margin-bottom: 10px; }
  .p1 { background: var(--bg-info); color: var(--tx-info); }
  .p2 { background: var(--bg-warn); color: var(--tx-warn); }
  .p3 { background: var(--bg-ok); color: var(--tx-ok); }
  .p4 { background: var(--bg-err); color: var(--tx-err); }
  .shdr { display: flex; align-items: flex-start; gap: 12px; margin-bottom: 16px; }
  .num { width: 36px; height: 36px; border-radius: 50%; background: var(--bg-info); color: var(--tx-info); display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 500; flex-shrink: 0; }
  .stitle { font-size: 17px; font-weight: 500; margin: 0 0 4px; }
  .ssub { font-size: 13px; color: var(--tx2); margin: 0; }
  .sbody { font-size: 14px; line-height: 1.7; }
  .sbody p { margin: 0 0 12px; }
  .code { background: var(--bg2); border: 0.5px solid var(--br); border-radius: var(--r); padding: 12px 14px; font-family: var(--mono); font-size: 12px; white-space: pre-wrap; word-break: break-all; margin: 10px 0; direction: ltr; text-align: left; line-height: 1.6; }
  .tip { background: var(--bg-info); border: 0.5px solid var(--br); border-radius: var(--r); padding: 10px 14px; font-size: 13px; color: var(--tx-info); margin: 12px 0; }
  .warn { background: var(--bg-warn); border: 0.5px solid var(--br); border-radius: var(--r); padding: 10px 14px; font-size: 13px; color: var(--tx-warn); margin: 12px 0; }
  .ok { background: var(--bg-ok); border: 0.5px solid var(--br); border-radius: var(--r); padding: 10px 14px; font-size: 13px; color: var(--tx-ok); margin: 12px 0; }
  .cl { list-style: none; padding: 0; margin: 10px 0; }
  .cl li { display: flex; align-items: flex-start; gap: 10px; padding: 6px 0; border-bottom: 0.5px solid var(--br); font-size: 14px; }
  .cl li:last-child { border-bottom: none; }
  .chk { width: 18px; height: 18px; border-radius: 4px; border: 1.5px solid var(--br2); flex-shrink: 0; margin-top: 2px; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: all .15s; }
  .chk.on { background: var(--bg-ok); border-color: var(--tx-ok); }
  .chk.on::after { content: '✓'; font-size: 11px; color: var(--tx-ok); }
  .foot { display: flex; align-items: center; justify-content: space-between; padding: 1rem 1.5rem; border-top: 0.5px solid var(--br); }
  .btn { padding: 8px 18px; border-radius: var(--r); border: 0.5px solid var(--br2); background: transparent; color: var(--tx); font-size: 13px; cursor: pointer; font-family: var(--sans); transition: background .15s; }
  .btn:hover { background: var(--bg2); }
  .btn:disabled { opacity: .35; cursor: not-allowed; }
  .btn.pri { background: var(--bg-info); color: var(--tx-info); border-color: transparent; }
  .ctr { font-size: 12px; color: var(--tx3); }
  .flow { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; margin: 14px 0; direction: ltr; }
  .fn { background: var(--bg2); border: 0.5px solid var(--br2); border-radius: 6px; padding: 6px 12px; font-size: 12px; white-space: nowrap; color: var(--tx); }
  .fn.new { background: var(--bg-ok); border-color: var(--tx-ok); color: var(--tx-ok); font-weight: 500; }
  .fn.mod { background: var(--bg-warn); border-color: var(--tx-warn); color: var(--tx-warn); font-weight: 500; }
  .chk.partner { background: var(--bg-warn); border-color: var(--tx-warn); }
  .chk.partner::after { content: '✓'; font-size: 11px; color: var(--tx-warn); }
  .share-bar { display: flex; align-items: center; gap: 10px; padding: 10px 1.5rem; border-bottom: 0.5px solid var(--br); background: var(--bg2); flex-wrap: wrap; }
  .share-bar span { font-size: 12px; color: var(--tx2); flex: 1; min-width: 120px; }
  .share-bar .copy-btn { padding: 6px 14px; border-radius: var(--r); border: 0.5px solid var(--br2); background: transparent; color: var(--tx-info); font-size: 12px; cursor: pointer; font-family: var(--sans); white-space: nowrap; }
  .share-bar .copy-btn:hover { background: var(--bg-info); }
  .partner-banner { background: var(--bg-warn); color: var(--tx-warn); font-size: 12px; padding: 8px 1.5rem; border-bottom: 0.5px solid var(--br); }
</style>
</head>
<body>
<div class="app">
  <div class="hdr">
    <h1>מדריך שדרוג אוטומציית Make.com</h1>
    <p>הוספת תמונות Google Maps + Agent סריקת רשתות חברתיות + Prompt לבניית אתר</p>
  </div>
  <div id="partner-banner" style="display:none" class="partner-banner">
    צופה בסימונים ששלח לך השותף — הצ&#39;קים הצהובים הם שלו, הירוקים שלך.
  </div>
  <div class="share-bar">
    <span id="share-count">0 / 0 משימות סומנו</span>
    <button class="copy-btn" id="copy-btn" onclick="copyShareLink()">שתף התקדמות עם השותף</button>
    <button class="copy-btn" onclick="clearChecks()" style="color:var(--tx-err)">אפס סימונים</button>
  </div>
  <div class="prog" id="prog"></div>
  <div class="body" id="sbody"></div>
  <div class="foot">
    <button class="btn" id="bprev" onclick="go(-1)">&#x2192; הקודם</button>
    <span class="ctr" id="ctr"></span>
    <button class="btn pri" id="bnext" onclick="go(1)">הבא &#x2190;</button>
  </div>
</div>
<script>
var steps = [
  {
    ph:1, pl:"הבנת הקצר הנוכחי", pc:"p1",
    title:"מה האוטומציה הנוכחית עושה",
    sub:"הבנת ה-flow לפני שמשנים",
    html:'<p>לפני שנוסיף כלום, חשוב להבין את הזרימה הקיימת. האוטומציה ב-Make.com כוללת 8 מודולים שעובדים בסדר הזה:</p><div class="flow"><div class="fn">1 · Google Places Search</div><div class="arr">&#x2192;</div><div class="fn">12 · Iterator</div><div class="arr">&#x2192;</div><div class="fn">15 · Airtable Search</div><div class="arr">&#x2192;</div><div class="fn">23 · Places Details</div><div class="arr">&#x2192;</div><div class="fn">24 · Airtable Create</div><div class="arr">&#x2192;</div><div class="fn">26 · Airtable Search</div><div class="arr">&#x2192;</div><div class="fn">33 · Gemini Generate</div><div class="arr">&#x2192;</div><div class="fn">42 · Vercel Deploy</div><div class="arr">&#x2192;</div><div class="fn">37 · Telegram Notify</div></div><p>הזרימה המתוכננת החדשה תוסיף <strong>3 מקטעים</strong> חדשים:</p><div class="flow"><div class="fn">24 · Create Record</div><div class="arr">&#x2192;</div><div class="fn new">NEW · שלוף תמונות</div><div class="arr">&#x2192;</div><div class="fn new">NEW · Agent סריקה</div><div class="arr">&#x2192;</div><div class="fn mod">33 · Gemini (עדכון Prompt)</div><div class="arr">&#x2192;</div><div class="fn">42 · Deploy</div></div><div class="tip">הצבע הירוק = מודולים חדשים שנוסיף. הצבע הצהוב = מודולים קיימים שנשנה.</div>'
  },
  {
    ph:1, pl:"הכנה - Google Places API", pc:"p1",
    title:"שלב 1 — הוספת שדה Photo URLs ל-Airtable",
    sub:"לפני הכל, מוודאים שה-Airtable מוכן לקבל תמונות",
    html:'<p>בשלב 24 (Airtable Create Record), האוטומציה כבר <em>יודעת</em> לשמור Photo URLs — אבל השדה ריק כי לא שלחנו כלום. נצטרך להוסיף את זה.</p><p><strong>פתח את Airtable בסיס "website automation" &#x2192; טבלת "Businesses"</strong> ובדוק:</p><ul class="cl"><li><div class="chk" onclick="tog(this)"></div><span>השדה <code>Photo URLs</code> (שדה ID: fldIBqtqwaPsMWAz1) קיים בטבלה</span></li><li><div class="chk" onclick="tog(this)"></div><span>סוג השדה הוא <strong>Long text</strong> (כדי לאחסן כמה URLs)</span></li><li><div class="chk" onclick="tog(this)"></div><span>הוסף גם שדה <strong>Social Links</strong> (Long text) — שם ישמרו הקישורים שנמצא</span></li><li><div class="chk" onclick="tog(this)"></div><span>הוסף שדה <strong>Website Prompt</strong> (Long text) — שם ישמר ה-Prompt שנוצר</span></li></ul><div class="warn">חשוב: רשום את ה-Field IDs של השדות החדשים. תצטרך אותם בהמשך. מצא אותם ב: Field Settings &#x2192; Copy field ID.</div>'
  },
  {
    ph:2, pl:"מודול חדש: שליפת תמונות", pc:"p2",
    title:"שלב 2 — עדכון מודול 23 לשליפת 8 תמונות + לוגו",
    sub:"קודם כל מוודאים שה-FieldMask מחזיר מספיק נתונים",
    html:'<p>לפני שמוסיפים מודולים, צריך לוודא שמודול 23 (Places Details) מחזיר את כל המידע שנצטרך.</p><p><strong>ערוך את מודול 23</strong> — עדכן את ה-Header של <code>X-Goog-FieldMask</code> ל:</p><div class="code">id,displayName,formattedAddress,nationalPhoneNumber,\ninternationalPhoneNumber,regularOpeningHours,rating,\nuserRatingCount,location,photos,iconBackgroundColor,\niconMaskBaseUri</div><div class="tip">השדה <code>iconMaskBaseUri</code> הוא ה<strong>לוגו/אייקון</strong> של המקום. זה URL לאיקון SVG מ-Google עצמה — בדרך כלל צלמית שמייצגת את סוג העסק (בית קפה, מסעדה וכו&apos;).</div><p>התגובה תכלול מערך <code>photos[]</code> עם עד 10 אובייקטים, כל אחד עם שדה <code>name</code>:</p><div class="code">{\n  "photos": [\n    { "name": "places/ChIJxxx/photos/AUacS_aaa" },\n    { "name": "places/ChIJxxx/photos/AUacS_bbb" },\n    { "name": "places/ChIJxxx/photos/AUacS_ccc" },\n    ... עד 10 תמונות\n  ],\n  "iconMaskBaseUri": "https://maps.gstatic.com/mapfiles/place_api/icons/v2/cafe_pinlet"\n}</div><div class="warn">Google מחזיר <strong>לכל היותר 10 תמונות</strong> בחינם. 8 תמונות מספיקות ועובדות בטוח.</div>'
  },
  {
    ph:2, pl:"מודול חדש: שליפת תמונות", pc:"p2",
    title:"שלב 3 — הוספת 8 מודולי HTTP לשליפת תמונות",
    sub:"מודול נפרד לכל תמונה — photos[0] עד photos[7]",
    html:'<p>Google Places מחזיר photo <em>references</em> — לא URLs ישירים. צריך לעשות HTTP request נפרד לכל תמונה.</p><p><strong>הוסף 8 מודולי HTTP &#x2192; Make a Request</strong> בזה אחר זה, מיד אחרי מודול 23. הגדרות זהות לכולם — רק ה-index משתנה:</p><div class="code">Method: GET\nHeaders: X-Goog-Api-Key: [המפתח שלך]\n\nQuery Parameters:\n  maxWidthPx: 1200\n  skipHttpRedirect: true   ← חשוב!\n\n── מודול Photo 1 ──\nURL: https://places.googleapis.com/v1/{{23.data.photos[].name}}/media\n\n── מודול Photo 2 ──\nURL: https://places.googleapis.com/v1/{{23.data.photos[1].name}}/media\n\n── מודול Photo 3 ──\nURL: https://places.googleapis.com/v1/{{23.data.photos[2].name}}/media\n\n── מודול Photo 4 ──\nURL: https://places.googleapis.com/v1/{{23.data.photos[3].name}}/media\n\n── מודול Photo 5 ──\nURL: https://places.googleapis.com/v1/{{23.data.photos[4].name}}/media\n\n── מודול Photo 6 ──\nURL: https://places.googleapis.com/v1/{{23.data.photos[5].name}}/media\n\n── מודול Photo 7 ──\nURL: https://places.googleapis.com/v1/{{23.data.photos[6].name}}/media\n\n── מודול Photo 8 ──\nURL: https://places.googleapis.com/v1/{{23.data.photos[7].name}}/media</div><div class="tip">שים לב: ב-Make.com, <code>photos[]</code> (ללא מספר) הוא התמונה הראשונה — שקול ל-photos[0]. כל שאר האינדקסים מתחילים מ-1.</div><p>כאשר <code>skipHttpRedirect: true</code>, התגובה היא JSON עם ה-URL בשדה <code>photoUri</code>. השתמש ב:</p><div class="code">{{[PHOTO_MODULE_ID].data.photoUri}}</div>'
  },
  {
    ph:2, pl:"מודול חדש: שליפת תמונות", pc:"p2",
    title:"שלב 3א — Error Handler על כל מודול תמונה",
    sub:"מה עושים כשלמקום יש פחות מ-8 תמונות",
    html:'<p>לא לכל מקום יש 8 תמונות. אם Google לא מוצא תמונה לאינדקס מסוים — המודול ייכשל ויעצור את כל ה-scenario.</p><p><strong>על כל אחד מ-8 מודולי התמונה:</strong></p><ul class="cl"><li><div class="chk" onclick="tog(this)"></div><span>לחץ על המודול &#x2192; מעגל קטן בצד שמאל (כפתור "+" האדום)</span></li><li><div class="chk" onclick="tog(this)"></div><span>בחר <strong>Add error handler</strong></span></li><li><div class="chk" onclick="tog(this)"></div><span>בחר <strong>Resume</strong> (ימשיך הלאה במקום להיכשל)</span></li><li><div class="chk" onclick="tog(this)"></div><span>אל תוסיף כלום בתוך ה-error handler — רק Resume ריק</span></li></ul><div class="ok">עם Resume, אם תמונה 6,7,8 לא קיימות — האוטומציה ממשיכה בשקט ומשאירה את השדה ריק.</div><div class="warn">ב-Airtable, השדה יהיה ריק עבור תמונות חסרות — זה בסדר. Gemini יתעלם מ-URLs ריקים כשיבנה את האתר.</div>'
  },
  {
    ph:2, pl:"מודול חדש: שליפת תמונות", pc:"p2",
    title:"שלב 4 — איחוד 8 תמונות + לוגו ב-Airtable",
    sub:"שמירת כל ה-URLs לשדות הנכונים במודול 24",
    html:'<p>כעת עדכן את <strong>מודול 24 (Airtable Create Record)</strong> לשמור את כל 8 התמונות והלוגו.</p><p><strong>שדה Photo URLs</strong> (fldIBqtqwaPsMWAz1) — הוסף את כל ה-URLs שורה-שורה:</p><div class="code">{{25a.data.photoUri}}\n{{25b.data.photoUri}}\n{{25c.data.photoUri}}\n{{25d.data.photoUri}}\n{{25e.data.photoUri}}\n{{25f.data.photoUri}}\n{{25g.data.photoUri}}\n{{25h.data.photoUri}}</div><p>החלף את <code>25a, 25b...</code> ב-IDs האמיתיים של המודולים שלך ב-Make.</p><p><strong>שדה Logo URL</strong> — הוסף שדה חדש ב-Airtable בשם <code>Logo URL</code> (Text) ומפה אותו ל:</p><div class="code">{{23.data.iconMaskBaseUri}}.png</div><div class="tip">Google מחזיר את <code>iconMaskBaseUri</code> בלי סיומת קובץ. הוסף <code>.png</code> בסוף כדי לקבל URL תקין לתמונה. לדוגמה: <code>https://maps.gstatic.com/mapfiles/place_api/icons/v2/cafe_pinlet.png</code></div><div class="ok">עכשיו כל רשומה ב-Airtable תכיל: עד 8 URLs של תמונות + URL של הלוגו/אייקון מ-Google.</div>'
  },
  {
    ph:2, pl:"ה-Agent החדש", pc:"p2",
    title:"שלב 4 — יצירת Agent לסריקת רשתות חברתיות",
    sub:"מודול חדש אחרי 24 ולפני 26 — Gemini ישמש כ-Agent",
    html:'<p>זה הלב של השדרוג. נוסיף מודול Gemini נוסף שיקבל את שם העסק + כתובת, ויחפש את הנוכחות הדיגיטלית שלו — כולל <strong>לוגו</strong> מהרשתות החברתיות.</p><p><strong>הוסף מודול Google Vertex AI &#x2192; Make an API Call</strong> לאחר מודול 24, לפני מודול 26.</p><p>השתמש באותן הגדרות החיבור כמו מודול 33, אבל עם ה-body הזה:</p><div class="code">{\n  "contents": [{\n    "role": "user",\n    "parts": [{\n      "text": "אתה agent לסריקת נוכחות דיגיטלית של עסקים.\\nשם: {{24.Name}}\\nכתובת: {{24.Address}}\\n\\nמצא:\\n1. דף Facebook של העסק — וחלץ את ה-URL של תמונת הפרופיל שלו\\n2. פרופיל Instagram — וחלץ את ה-URL של תמונת הפרופיל שלו\\n3. דף Wolt (wolt.com/il)\\n4. אתר רשמי\\n\\nלגבי הלוגו: קח את תמונת הפרופיל מהרשת החברתית שמצאת (Facebook או Instagram — מה שקיים). אם יש Facebook, השתמש בפורמט היציב: https://graph.facebook.com/[PAGE_ID]/picture?type=large\\n\\nחזור בפורמט JSON בלבד, ללא backticks:\\n{\\n  \\"facebook\\": \\"URL או null\\",\\n  \\"instagram\\": \\"URL או null\\",\\n  \\"wolt\\": \\"URL או null\\",\\n  \\"website\\": \\"URL או null\\",\\n  \\"logo_url\\": \\"URL ישיר לתמונת הפרופיל / לוגו או null\\"\\n}"\n    }]\n  }],\n  "tools": [{"google_search": {}}],\n  "generationConfig": {"maxOutputTokens": 2048}\n}</div><div class="tip">הלוגו מגיע מהרשתות החברתיות — לרוב תמונת הפרופיל של הפייסבוק או האינסטגרם היא הלוגו של העסק. אם יש Facebook Page ID, הפורמט <code>graph.facebook.com/[ID]/picture</code> הוא יציב לאורך זמן.</div><div class="warn">כדי ש-Gemini יוכל לגגל, צריך להפעיל את הכלי google_search. ודא שה-Vertex AI project שלך מאפשר Grounding with Google Search.</div>'
  },
  {
    ph:2, pl:"ה-Agent החדש", pc:"p2",
    title:"שלב 5 — שמירת תוצאות ה-Agent ב-Airtable",
    sub:"שמור את הקישורים שנמצאו לשדה Social Links",

var cur = 0;
var checks = {};

try {
  var saved = localStorage.getItem('guide_checks');
  if (saved) checks = JSON.parse(saved);
} catch(e) {}

try {
  var params = new URLSearchParams(window.location.search);
  var sharedParam = params.get('shared');
  if (sharedParam) window._sharedChecks = JSON.parse(atob(sharedParam));
} catch(e) {}

function saveChecks() {
  try { localStorage.setItem('guide_checks', JSON.stringify(checks)); } catch(e) {}
}

function tog(key) {
  checks[key] = !checks[key];
  var el = document.querySelector('.chk[data-key="' + key + '"]');
  if (el) el.classList.toggle('on', !!checks[key]);
  saveChecks();
  updateShareBtn();
}

function restoreChecks() {
  document.querySelectorAll('.chk[data-key]').forEach(function(el) {
    var key = el.getAttribute('data-key');
    el.classList.toggle('on', !!checks[key]);
    el.classList.toggle('partner', !!(window._sharedChecks && window._sharedChecks[key] && !checks[key]));
  });
}

function updateShareBtn() {
  var done = Object.values(checks).filter(Boolean).length;
  var total = 0;
  steps.forEach(function(s, si) {
    var matches = s.html.match(/class="chk"/g);
    if (matches) total += matches.length;
  });
  var el = document.getElementById('share-count');
  if (el) el.textContent = done + ' / ' + total + ' משימות סומנו';
}

function copyShareLink() {
  var encoded = btoa(unescape(encodeURIComponent(JSON.stringify(checks))));
  var url = window.location.href.split('?')[0] + '?shared=' + encoded;
  navigator.clipboard.writeText(url).then(function() {
    var btn = document.getElementById('copy-btn');
    btn.textContent = 'הועתק!';
    setTimeout(function() { btn.textContent = 'שתף התקדמות עם השותף'; }, 2000);
  });
}

function render() {
  var s = steps[cur];
  var dots = '';
  for (var i = 0; i < steps.length; i++) {
    var cls = 'dot' + (i < cur ? ' done' : '') + (i === cur ? ' active' : '');
    dots += '<div class="' + cls + '" onclick="jump(' + i + ')" title="' + steps[i].title + '"></div>';
  }
  document.getElementById('prog').innerHTML = dots;

  // inject data-key and fixed onclick into every .chk in this step
  var chkIdx = 0;
  var html = s.html.replace(/class="chk"/g, function() {
    var key = 's' + cur + 'c' + (chkIdx++);
    return 'class="chk" data-key="' + key + '" onclick="tog(\'' + key + '\')"';
  });

  document.getElementById('sbody').innerHTML =
    '<span class="badge ' + s.pc + '">' + s.pl + '</span>' +
    '<div class="shdr">' +
      '<div class="num">' + (cur + 1) + '</div>' +
      '<div><p class="stitle">' + s.title + '</p><p class="ssub">' + s.sub + '</p></div>' +
    '</div>' +
    '<div class="sbody">' + html + '</div>';

  restoreChecks();
  document.getElementById('ctr').textContent = (cur + 1) + ' / ' + steps.length;
  document.getElementById('bprev').disabled = cur === 0;
  document.getElementById('bnext').disabled = cur === steps.length - 1;
  updateShareBtn();
}

function go(d) { cur = Math.max(0, Math.min(steps.length - 1, cur + d)); render(); }
function jump(i) { cur = i; render(); }

function clearChecks() {
  if (!confirm('לאפס את כל הסימונים?')) return;
  checks = {};
  saveChecks();
  render();
}

if (window._sharedChecks) {
  document.getElementById('partner-banner').style.display = 'block';
}

render();
</script>
